apiVersion: 1
providers:
  - name: AirQualityDashboards
    orgId: 1
    folder: Air Quality
    folderUid: air-quality
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
