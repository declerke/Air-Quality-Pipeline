version: "3.8"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.2
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: 30
    _PIP_ADDITIONAL_REQUIREMENTS: ""
    AIRFLOW__CORE__DEFAULT_TIMEZONE: Africa/Nairobi
    AQ_POSTGRES_HOST: postgres-data
    AQ_POSTGRES_PORT: 5432
    AQ_POSTGRES_DB: airquality
    AQ_POSTGRES_USER: aquser
    AQ_POSTGRES_PASSWORD: aqpassword
    AQ_DATA_LANDING: /opt/airflow/data/landing
    AQ_DATA_PROCESSED: /opt/airflow/data/processed
    OPENAQ_BASE_URL: https://api.openaq.org/v3
    OPENAQ_LOCATIONS_KENYA: "Nairobi,Mombasa,Kisumu"
    OPENAQ_GLOBAL_CITIES: "London,New York,Beijing,Delhi,Lagos"
    PM25_ALERT_THRESHOLD: 35.4
    PM10_ALERT_THRESHOLD: 154
    PYTHONPATH: /opt/airflow/src
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
    - ./requirements.txt:/requirements.txt
  depends_on:
    postgres-airflow:
      condition: service_healthy
    postgres-data:
      condition: service_healthy
  networks:
    - pipeline-net

services:
  postgres-airflow:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - pipeline-net

  postgres-data:
    image: postgres:15
    environment:
      POSTGRES_USER: aquser
      POSTGRES_PASSWORD: aqpassword
      POSTGRES_DB: airquality
    volumes:
      - postgres-aq-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "aquser", "-d", "airquality"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - pipeline-net

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        pip install --no-cache-dir -r /requirements.txt &&
        airflow db migrate &&
        airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@airquality.local --password admin &&
        airflow connections add 'postgres_aq' --conn-type postgres --conn-host postgres-data --conn-schema airquality --conn-login aquser --conn-password aqpassword --conn-port 5432 || true
      "
    depends_on:
      postgres-airflow:
        condition: service_healthy
      postgres-data:
        condition: service_healthy
    networks:
      - pipeline-net

  airflow-webserver:
    <<: *airflow-common
    command: >
      bash -c "pip install --no-cache-dir -r /requirements.txt && airflow webserver"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: >
      bash -c "pip install --no-cache-dir -r /requirements.txt && airflow scheduler"
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname)"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  grafana:
    image: grafana/grafana:10.4.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: grafana
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-worldmap-panel,grafana-piechart-panel
      GF_UNIFIED_ALERTING_ENABLED: "true"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      postgres-data:
        condition: service_healthy
    networks:
      - pipeline-net
    restart: unless-stopped

volumes:
  postgres-airflow-data:
  postgres-aq-data:
  airflow-logs:
  airflow-plugins:
  grafana-data:

networks:
  pipeline-net:
    driver: bridge